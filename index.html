<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlushFinder - 附近廁所即時搜尋</title>
    <meta name="description" content="快速尋找附近乾淨、可用的公共與友善廁所。支援無障礙、親子設施篩選。">
    <!-- PWA Meta Tags & Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.jpg">
    <!-- Google Fonts: Outfit & Noto Sans TC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css?v=41">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar overlay for mobile -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Sidebar / Control Panel -->
        <aside class="sidebar" id="sidebar">
            <header class="app-header">
                <div class="header-main">
                    <div class="logo">
                        <i data-lucide="map-pin" class="logo-icon"></i>
                        <h1>FlushFinder</h1>
                    </div>
                    <button class="close-sidebar-btn" id="close-sidebar" data-i18n-title="close_menu" title="關閉選單">
                        <i data-lucide="x"></i>
                    </button>
                </div>
                <p class="subtitle" data-i18n="app_subtitle">尋找身邊最舒適的方便之處</p>
                <div class="user-current-location" id="user-current-location">
                    <i data-lucide="navigation" style="width: 12px; height: 12px;"></i>
                    <span id="current-location-text" data-i18n="locating">正在定位您的位置...</span>
                </div>
                <div class="search-location-bar" style="margin-top: 10px; display: flex; gap: 6px;">
                    <input type="text" id="search-location-input" data-i18n-placeholder="search_placeholder" placeholder="輸入地址或地標手動定位..." style="flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background-color: var(--bg-primary); color: var(--text-primary); font-size: 12px; outline: none; transition: var(--transition-smooth);">
                    <button class="btn btn-primary" id="search-location-btn" data-i18n="locate" style="padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; flex-shrink: 0;">定位</button>
                </div>
                <div class="location-tip">
                    <i data-lucide="info"></i>
                    <span data-i18n="location_tip">提示：拖曳地圖上的藍色定位點，或在任一處按兩下地圖即可手動修正位置。</span>
                </div>
            </header>

            <!-- Filters Section -->
            <section class="filters-section">
                <h2><i data-lucide="sliders-horizontal"></i> <span data-i18n="filters_title">設施與條件篩選</span></h2>
                <div class="filter-group">
                    <button class="filter-chip active" data-filter="all" data-i18n="filter_all">全部</button>
                    <button class="filter-chip" data-filter="accessible">
                        <i data-lucide="accessibility"></i> <span data-i18n="filter_accessible">無障礙</span>
                    </button>
                    <button class="filter-chip" data-filter="baby">
                        <i data-lucide="baby"></i> <span data-i18n="filter_baby">親子/母嬰</span>
                    </button>
                    <button class="filter-chip" data-filter="free">
                        <i data-lucide="circle-dollar-sign"></i> <span data-i18n="filter_free">免費使用</span>
                    </button>
                    <button class="filter-chip" data-filter="rating">
                        <i data-lucide="star"></i> <span data-i18n="filter_rating">4星以上</span>
                    </button>
                </div>
            </section>

            <!-- Results Section -->
            <section class="results-section">
                <div class="results-header">
                    <h2><i data-lucide="list"></i> <span data-i18n="results_title">附近廁所</span> (<span id="results-count">0</span>)</h2>
                    <span class="sort-label" data-i18n="sort_by_distance">依距離排序</span>
                </div>
                <div class="results-list" id="results-list">
                    <!-- Dynamic List Items will be inserted here -->
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <p data-i18n="locating_and_loading">正在定位並載入周邊廁所...</p>
                    </div>
                </div>
            </section>

            <!-- Settings Section -->
            <section class="settings-section">
                <button class="settings-toggle" id="settings-toggle">
                    <span class="toggle-left">
                        <i data-lucide="settings" style="width:16px; height:16px;"></i>
                        <span data-i18n="settings_title">資料來源設定</span>
                    </span>
                    <i data-lucide="chevron-down" class="chevron-icon" id="settings-chevron"></i>
                </button>
                <div class="settings-content" id="settings-content">
                    <p class="settings-desc" data-i18n="settings_source_desc">選擇要載入的廁所資料來源：</p>
                    <div style="margin-bottom: 12px;">
                        <select id="source-select" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background-color: var(--bg-primary); color: var(--text-primary); font-size: 12px; outline: none; cursor:pointer;">
                            <option value="local" data-i18n="source_local">台灣環境部公廁與商家資料 (支援離線)</option>
                            <option value="osm" data-i18n="source_osm">OpenStreetMap (全球即時免金鑰)</option>
                        </select>
                    </div>

                    <p class="settings-desc" style="margin-top: 12px;" data-i18n="settings_lang_desc">選擇介面語言 (Language)：</p>
                    <div style="margin-bottom: 12px;">
                        <select id="lang-select" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background-color: var(--bg-primary); color: var(--text-primary); font-size: 12px; outline: none; cursor:pointer;">
                            <option value="zh-TW">繁體中文</option>
                            <option value="en">English</option>
                            <option value="ja">日本語</option>
                            <option value="sv">Svenska</option>
                            <option value="ne">नेपाली (Nepali)</option>
                        </select>
                    </div>

                    <p class="settings-desc" style="margin-top: 12px;" data-i18n="settings_font_desc">設定介面與地圖字體大小：</p>
                    <div style="margin-bottom: 12px;">
                        <select id="font-size-select" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background-color: var(--bg-primary); color: var(--text-primary); font-size: 12px; outline: none; cursor:pointer;">
                            <option value="sm" data-i18n="font_sm">小 (Small)</option>
                            <option value="md" data-i18n="font_md">中 (Medium - 預設)</option>
                            <option value="lg" data-i18n="font_lg">大 (Large)</option>
                        </select>
                    </div>



                    <div class="data-source-status" style="margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 10px;">
                        <span data-i18n="current_source_label">目前資料來源：</span>
                        <strong id="data-source-label">本地離線資料</strong>
                    </div>

                    <div style="margin-top: 8px; display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--text-secondary);">
                        <span id="app-version-label" data-i18n="app_version">App 版本: v41 (修復 SW 靜態快取與全面移除原生 confirm)</span>
                        <button id="clear-cache-btn" style="background: none; border: none; color: var(--primary); text-decoration: underline; cursor: pointer; font-size: 11px; padding: 0;" data-i18n="force_clear_cache">強制更新快取</button>
                    </div>
                </div>
            </section>
        </aside>

        <!-- Main Map Area -->
        <main class="map-area">
            <!-- Menu Toggle Button for mobile -->
            <button class="menu-toggle-btn" id="menu-toggle" data-i18n-title="open_menu" title="開啟選單">
                <i data-lucide="menu"></i>
            </button>

            <!-- Fullscreen Leaflet Map -->
            <div id="map"></div>

            <!-- Floating Controls -->
            <div class="map-controls">
                <button class="control-btn" id="locate-btn" data-i18n-title="my_location" title="我的位置">
                    <i data-lucide="locate"></i>
                </button>
                <button class="control-btn" id="theme-btn" data-i18n-title="toggle_theme" title="切換深淺色地圖">
                    <i data-lucide="moon"></i>
                </button>
            </div>

            <!-- Detail Drawer (Mobile Bottom Sheet / Desktop Floating Card) -->
            <div class="detail-drawer" id="detail-drawer">
                <button class="close-drawer-btn" id="close-drawer">
                    <i data-lucide="x"></i>
                </button>
                <div class="drawer-content" id="drawer-content">
                    <!-- Dynamic Detail Content -->
                </div>
            </div>
        </main>
    </div>

    <!-- Custom Alert Modal -->
    <div class="custom-modal-overlay" id="custom-alert-modal">
        <div class="custom-modal-content">
            <div class="custom-modal-header">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="modal-info-icon"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                <h3 class="custom-modal-title" data-i18n="modal_title_notice">系統提示</h3>
            </div>
            <div class="custom-modal-body">
                <p id="custom-alert-message"></p>
            </div>
            <div class="custom-modal-footer">
                <button class="btn btn-primary" id="custom-alert-close-btn" data-i18n="confirm_ok">確定</button>
            </div>
        </div>
    </div>

    <!-- Custom Confirm Modal -->
    <div class="custom-modal-overlay" id="custom-confirm-modal">
        <div class="custom-modal-content">
            <div class="custom-modal-header">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="modal-info-icon"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                <h3 class="custom-modal-title" data-i18n="modal_title_notice">系統提示</h3>
            </div>
            <div class="custom-modal-body">
                <p id="custom-confirm-message"></p>
            </div>
            <div class="custom-modal-footer" style="gap: 12px;">
                <button class="btn btn-secondary" id="custom-confirm-cancel-btn" data-i18n="confirm_cancel">取消</button>
                <button class="btn btn-primary" id="custom-confirm-ok-btn" data-i18n="confirm_ok">確定</button>
            </div>
        </div>
    </div>

    <!-- Leaflet.js JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Custom JS -->
    <script src="app.js?v=41"></script>
</body>
</html>
